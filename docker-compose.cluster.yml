# A 3-broker kafka cluster. Run with:
#   docker compose -f docker-compose.cluster.yml up --build
# Then point any Kafka client at localhost:9092 (it discovers all three brokers).
#
# Every broker shares the same KAFKA_BROKERS membership; each has a unique KAFKA_NODE_ID and
# advertises a host:port reachable from the client (here, localhost:909x via port maps).
x-broker: &broker
  build: .
  image: kafka:latest
  healthcheck:
    test: ["CMD", "/mqbroker", "healthcheck"]
    interval: 10s
    timeout: 3s
    start_period: 10s
    retries: 3
  environment: &broker-env
    KAFKA_BROKERS: "0@localhost:9092,1@localhost:9093,2@localhost:9094"
    KAFKA_LISTENERS: "0.0.0.0:9092"
    KAFKA_LOG_DIRS: "/var/lib/kafka"
    KAFKA_NUM_PARTITIONS: "6"
    KAFKA_AUTO_CREATE_TOPICS: "true"

services:
  kafka0:
    <<: *broker
    ports: ["9092:9092"]
    environment:
      <<: *broker-env
      KAFKA_NODE_ID: "0"
      KAFKA_ADVERTISED_LISTENERS: "localhost:9092"
    volumes: ["kafka0-data:/var/lib/kafka"]

  kafka1:
    <<: *broker
    ports: ["9093:9092"]
    environment:
      <<: *broker-env
      KAFKA_NODE_ID: "1"
      KAFKA_ADVERTISED_LISTENERS: "localhost:9093"
    volumes: ["kafka1-data:/var/lib/kafka"]

  kafka2:
    <<: *broker
    ports: ["9094:9092"]
    environment:
      <<: *broker-env
      KAFKA_NODE_ID: "2"
      KAFKA_ADVERTISED_LISTENERS: "localhost:9094"
    volumes: ["kafka2-data:/var/lib/kafka"]

volumes:
  kafka0-data:
  kafka1-data:
  kafka2-data:
