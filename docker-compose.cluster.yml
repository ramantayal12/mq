# A 3-broker mq cluster. Run with:
#   docker compose -f docker-compose.cluster.yml up --build
# Then point any Kafka client at localhost:9092 (it discovers all three brokers).
#
# Every broker shares the same MQ_BROKERS membership; each has a unique MQ_NODE_ID and
# advertises a host:port reachable from the client (here, localhost:909x via port maps).
x-broker: &broker
  build: .
  image: mq:latest
  environment: &broker-env
    MQ_BROKERS: "0@localhost:9092,1@localhost:9093,2@localhost:9094"
    MQ_LISTENERS: "0.0.0.0:9092"
    MQ_LOG_DIRS: "/var/lib/mq"
    MQ_NUM_PARTITIONS: "6"
    MQ_AUTO_CREATE_TOPICS: "true"

services:
  mq0:
    <<: *broker
    ports: ["9092:9092"]
    environment:
      <<: *broker-env
      MQ_NODE_ID: "0"
      MQ_ADVERTISED_LISTENERS: "localhost:9092"
    volumes: ["mq0-data:/var/lib/mq"]

  mq1:
    <<: *broker
    ports: ["9093:9092"]
    environment:
      <<: *broker-env
      MQ_NODE_ID: "1"
      MQ_ADVERTISED_LISTENERS: "localhost:9093"
    volumes: ["mq1-data:/var/lib/mq"]

  mq2:
    <<: *broker
    ports: ["9094:9092"]
    environment:
      <<: *broker-env
      MQ_NODE_ID: "2"
      MQ_ADVERTISED_LISTENERS: "localhost:9094"
    volumes: ["mq2-data:/var/lib/mq"]

volumes:
  mq0-data:
  mq1-data:
  mq2-data:
