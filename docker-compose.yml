# Run the broker with: docker compose up --build
# Then point any Kafka client at localhost:9092.
# Grafana: http://localhost:3005  Prometheus: http://localhost:9095
services:
  kafka:
    build: .
    image: kafka:latest
    user: "0"
    ports:
      - "9092:9092"
      - "7080:7080"
    environment:
      KAFKA_LISTENERS: "0.0.0.0:9092"
      # Clients receive this host:port in Metadata and reconnect to it, so it must be
      # reachable from where the client runs (the host, here).
      KAFKA_ADVERTISED_LISTENERS: "localhost:9092"
      KAFKA_LOG_DIRS: "/var/lib/kafka"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_AUTO_CREATE_TOPICS: "true"
      KAFKA_METRICS_ADDR: "0.0.0.0:7080"
    # In-binary Kafka ApiVersions probe (see Dockerfile HEALTHCHECK).
    healthcheck:
      test: ["CMD", "/mqbroker", "healthcheck"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 3
    volumes:
      - kafka-data:/var/lib/kafka
    networks:
      - kafka-net

  # Object storage for the (opt-in) object backend. Speaks the S3 API, so the same client
  # code path runs here and against GCS's S3-interop endpoint in prod.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - kafka-net

  # One-shot: wait for MinIO, then create the bucket. Exits 0 when done.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      until mc ready local; do sleep 1; done;
      mc mb -p local/kafka-data;
      exit 0
      "
    networks:
      - kafka-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9095:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - kafka-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3005:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - kafka-net

networks:
  kafka-net:

volumes:
  kafka-data:
  minio-data:
  prometheus-data:
  grafana-data:
